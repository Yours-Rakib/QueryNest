{% extends "base.html" %}
{% block title %}{{ action }} Internship{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="page-header">
      <h3 class="fw-bold mb-1"><i class="bi bi-briefcase-fill me-2"></i>{{ action }} Internship</h3>
    </div>
    <div class="card">
      <div class="card-body p-4">
        <form method="post">

          <div class="mb-3">
            <label class="form-label fw-semibold">Internship Title</label>
            <input type="text" name="title" class="form-control"
                   value="{{ internship.title if internship else '' }}"
                   placeholder="e.g. Junior Software Engineer Intern" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Company Name</label>
            <input type="text" name="company" class="form-control"
                   value="{{ internship.company if internship else '' }}"
                   placeholder="e.g. Brain Station 23">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Description</label>
            <textarea name="description" class="form-control" rows="4"
                      placeholder="Role details, requirements, duration…">{{ internship.description if internship else '' }}</textarea>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold"><i class="bi bi-calendar3 me-1"></i>Application Deadline <small class="text-muted fw-normal">(optional)</small></label>
            <input type="date" name="deadline" class="form-control"
                   value="{{ internship.deadline if internship else '' }}">
          </div>

          <div class="mb-4">
            <label class="form-label fw-semibold"><i class="bi bi-link-45deg me-1"></i>More Info Link <small class="text-muted fw-normal">(optional)</small></label>
            <input type="url" name="link" class="form-control"
                   value="{{ internship.link if internship else '' }}"
                   placeholder="https://brainstation-23.com/careers">
          </div>

          <div class="d-flex gap-3">
            <button type="submit" class="btn btn-primary fw-semibold px-4">
              <i class="bi bi-check-lg me-2"></i>{{ action }} Internship
            </button>
            <a href="{{ url_for('admin_campus') }}#tab-internships" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
